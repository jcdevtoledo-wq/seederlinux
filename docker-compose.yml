# =============================================================================
# SeederLinux — Stack Simplificada (3 containers)
# PostgreSQL + Backend API + Frontend
# Executar: docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # 1. Banco de dados PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seederlinux"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: seederlinux
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seederlinux123}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - seeder_net

  # ---------------------------------------------------------------------------
  # 2. Backend API (Fastify + Prisma) - Porta 8000
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-seederlinux123}@db:5432/seederlinux?schema=public
      JWT_SECRET: ${JWT_SECRET:-seederlinux-jwt-secret-change-in-production}
      SETUP_TOKEN: ${SETUP_TOKEN:-seederlinux-setup-token}
    networks:
      - seeder_net

  # ---------------------------------------------------------------------------
  # 3. Frontend App (TanStack Start)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_SEEDER_MODE: ${VITE_SEEDER_MODE:-full}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    ports:
      - "0.0.0.0:${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - seeder_net

volumes:
  db_data:

networks:
  seeder_net:
    driver: bridge